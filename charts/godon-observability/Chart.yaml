apiVersion: v2
name: godon-observability
description: Observability stack for godon (Loki + Grafana)
version: 0.1.0
appVersion: "1.0"
maintainers:
  - name: cherusk
    url: https://github.com/cherusk
dependencies:
  - name: loki
    version: 6.7.0
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: grafana
    version: 8.0.0
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: promtail
    version: 6.16.0
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled
