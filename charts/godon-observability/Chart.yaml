apiVersion: v2
name: godon-observability
description: Observability stack for godon (ClickHouse + Grafana)
version: 0.4.0
appVersion: "1.0"
maintainers:
  - name: cherusk
    url: https://github.com/cherusk
dependencies:
  - name: clickhouse
    version: "9.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: clickhouse.enabled
  - name: grafana
    version: "8.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
