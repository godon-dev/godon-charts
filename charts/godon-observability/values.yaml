---
namespace:
  create: false
  name: godon-observability

########################################
## Component | OpenTelemetry Collector
########################################
opentelemetry-collector:
  enabled: true

  mode: deployment

  image:
    repository: otel/opentelemetry-collector-k8s
    tag: "0.117.0"

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlphttp:
        endpoint: http://godon-observability-loki.godon-observability.svc.cluster.local:3100/otlp

    service:
      pipelines:
        logs:
          receivers: [otlp]
          exporters: [otlphttp]

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  service:
    type: ClusterIP

########################################
## Component | Loki (Log Storage)
########################################
loki:
  enabled: true

  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 168h
      max_query_length: 721h
      max_query_parallelism: 32

  singleBinary:
    replicas: 1
    extraVolumes:
      - name: loki-storage
        hostPath:
          path: /srv/storage/loki
          type: DirectoryOrCreate
    extraVolumeMounts:
      - name: loki-storage
        mountPath: /var/loki
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  persistence:
    enabled: false
  test:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        install: false
  gateway:
    enabled: false
  canary:
    enabled: false

########################################
## Component | Grafana (Visualization)
########################################
grafana:
  enabled: true

  adminPassword: admin

  auth:
    anonymous:
      enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  persistence:
    enabled: false

  extraVolumes:
    - name: grafana-storage
      hostPath:
        path: /srv/storage/grafana
        type: DirectoryOrCreate
  extraVolumeMounts:
    - name: grafana-storage
      mountPath: /data/grafana

  securityContext:
    fsGroup: 472

  env:
    GF_PATHS_DATA: /data/grafana
    GF_PATHS_PLUGINS: /data/grafana/plugins

  service:
    type: ClusterIP
    port: 80

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: http://godon-observability-loki.godon-observability.svc.cluster.local:3100
          access: proxy
          isDefault: true

########################################
## Component | Promtail (Log Collector)
########################################
promtail:
  enabled: true

  config:
    clients:
      - url: http://godon-observability-loki.godon-observability.svc.cluster.local:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - match:
            selector: '{component=~"api|metrics-exporter|seeder"}'
            action: keep
            stages:
              - {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
