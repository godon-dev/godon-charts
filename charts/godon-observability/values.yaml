---
namespace:
  create: false
  name: godon-observability

########################################
## Component | ClickHouse (Log Storage)
########################################
clickhouse:
  enabled: true

  auth:
    username: default
    password: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  initdbScripts:
    create-logs-table.sql: |
      CREATE DATABASE IF NOT EXISTS logs;

      CREATE TABLE IF NOT EXISTS logs.app_logs (
        timestamp DateTime64(6) DEFAULT now64(6),
        level Enum8('debug'=1, 'info'=2, 'warn'=3, 'error'=4),
        service String,
        message String,
        attributes String
      ) ENGINE = MergeTree()
      PARTITION BY toYYYYMMDD(timestamp)
      ORDER BY (service, timestamp)
      TTL timestamp + INTERVAL 30 DAY DELETE;

########################################
## Component | Grafana (Visualization)
########################################
grafana:
  enabled: true

  adminPassword: admin

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  persistence:
    enabled: false

  service:
    type: ClusterIP
    port: 80

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: ClickHouse
          type: grafana-clickhouse-datasource
          url: http://godon-observability-clickhouse.godon-observability.svc.cluster.local:8123
          access: proxy
          isDefault: true
          jsonData:
            defaultDatabase: logs
            port: 9000
            username: default

  plugins:
    - grafana-clickhouse-datasource
