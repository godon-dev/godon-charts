---
namespace:
  create: false
  name: godon-observability

########################################
## Component | Loki (Log Storage)
########################################
loki:
  enabled: true

  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 168h
      max_query_length: 721h
      max_query_parallelism: 32

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  persistence:
    enabled: false
  test:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        install: false
  gateway:
    enabled: false
  canary:
    enabled: false

########################################
## Component | Grafana (Visualization)
########################################
grafana:
  enabled: true

  adminPassword: admin

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  persistence:
    enabled: false

  service:
    type: ClusterIP
    port: 80

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: http://godon-observability-loki.godon-observability.svc.cluster.local:3100
          access: proxy
          isDefault: true
