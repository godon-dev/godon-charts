{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "godon-observability.fullname" . }}-clickhouse-init
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  {{- range $file, $content := .Values.clickhouse.initdbScripts }}
  {{ $file }}: |
    {{- $content | nindent 4 }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "godon-observability.fullname" . }}-clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:latest
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: logs
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.username }}
            {{- if .Values.clickhouse.auth.password }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.clickhouse.auth.password }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
      volumes:
        - name: data
          hostPath:
            path: /srv/storage/clickhouse/data
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /srv/storage/clickhouse/logs
            type: DirectoryOrCreate
        - name: init-scripts
          configMap:
            name: {{ include "godon-observability.fullname" . }}-clickhouse-init
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "godon-observability.fullname" . }}-clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8123
      targetPort: http
      name: http
    - port: 9000
      targetPort: native
      name: native
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
