name: "Uninstall Godon Chart"

on:
  workflow_dispatch:
    inputs:
      keep_namespace:
        description: 'Keep the namespace after uninstalling'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  uninstall-chart:
    name: Uninstall Godon from KIND
    runs-on: [self-hosted, linux]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
    - name: Verify KIND Cluster
      run: |
        echo "🔍 Verifying KIND cluster..."
        if ! kind get clusters | grep -q "godon-1-cluster"; then
          echo "❌ KIND cluster 'godon-1-cluster' not found"
          echo "Available clusters:"
          kind get clusters
          exit 1
        fi
        echo "✅ KIND cluster exists"
        kind export kubeconfig --name=godon-1-cluster --kubeconfig=/tmp/kind_kubeconfig.yaml
        kubectl cluster-info --kubeconfig=/tmp/kind_kubeconfig.yaml
    - name: List installed Helm releases
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "📋 Listing all Helm releases..."
        helm list --all-namespaces || echo "No releases found"
    - name: Show current resources
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "📊 Showing current resources..."
        echo ""
        echo "Namespaces:"
        kubectl get namespaces | grep -E godon || echo "No godon namespaces found"
        echo ""
        echo "Pods in godon namespace:"
        kubectl get pods -n godon 2>/dev/null || echo "No pods"
        echo ""
        echo "Pods in godon-observability namespace:"
        kubectl get pods -n godon-observability 2>/dev/null || echo "No pods"
    - name: Uninstall charts
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "🗑️  Uninstalling charts..."
        helm uninstall godon -n godon --wait --ignore-not-found
        helm uninstall godon-observability -n godon-observability --wait --ignore-not-found
        echo "✅ Charts uninstalled"
    - name: Wait for pod termination
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "⏳ Waiting for pods to terminate..."
        kubectl wait --for=delete pod,job,deployment -l app.kubernetes.io/instance=godon -n godon --timeout=60s || true
        kubectl wait --for=delete pod,job,deployment -l app.kubernetes.io/instance=godon-observability -n godon-observability --timeout=60s || true
        kubectl -n godon delete jobs --all --force --grace-period=0 || true
        kubectl -n godon-observability delete jobs --all --force --grace-period=0 || true
        echo "✅ All pods and jobs terminated"
    - name: Delete ALL PersistentVolumes
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "🗑️ Deleting all persistent volumes..."
        kubectl -n godon delete pvc --all --force --grace-period=0 || true
        kubectl -n godon-observability delete pvc --all --force --grace-period=0 || true
        sleep 5
        REMAINING_PVCS=$(kubectl -n godon get pvc --no-headers 2>/dev/null | wc -l)
        REMAINING_OBS_PVCS=$(kubectl -n godon-observability get pvc --no-headers 2>/dev/null | wc -l)
        if [ "$REMAINING_PVCS" -gt 0 ] || [ "$REMAINING_OBS_PVCS" -gt 0 ]; then
          echo "⚠️ Found remaining PVCs, force deleting again..."
          kubectl -n godon delete pvc --all --force --grace-period=0 --timeout=10s || true
          kubectl -n godon-observability delete pvc --all --force --grace-period=0 --timeout=10s || true
          sleep 3
        fi
        echo "✅ All PVCs deleted"
    - name: Clean up hostPath data
      run: |
        echo "🧹 Cleaning up hostPath data from KIND nodes..."
        for node in $(kind get nodes --name godon-1-cluster); do
          echo "Cleaning up node: $node"
          docker exec "$node" rm -rf /srv/storage/yugabytedb/ || true
          docker exec "$node" rm -rf /srv/storage/loki/ || true
          docker exec "$node" rm -rf /srv/storage/grafana/ || true
        done
        echo "✅ hostPath data cleaned"
    - name: Clean up namespaces (if requested)
      if: github.event.inputs.keep_namespace != 'true'
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "🧹 Deleting namespaces..."
        kubectl delete namespace godon --timeout=60s || echo "⚠️  godon namespace deletion timed out"
        kubectl delete namespace godon-observability --timeout=60s || echo "⚠️  godon-observability namespace deletion timed out"
        echo "✅ Namespaces deleted"
    - name: Verify cleanup
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "🔍 Verifying cleanup..."
        echo ""
        echo "Namespaces:"
        kubectl get namespaces | grep -E godon && echo "⚠️  godon namespaces still exist" || echo "✅ godon namespaces removed"
        echo ""
        echo "PVs:"
        kubectl get pv | grep -E godon && echo "⚠️  godon PVs still exist" || echo "✅ No godon PVs"
    - name: Final cluster status
      if: always()
      env:
        KUBECONFIG: /tmp/kind_kubeconfig.yaml
      run: |
        echo "📊 Final cluster status..."
        echo ""
        echo "All namespaces:"
        kubectl get namespaces
        echo ""
        echo "All Helm releases:"
        helm list --all-namespaces || echo "No releases"
        echo ""
        echo "Cluster nodes:"
        kubectl get nodes
