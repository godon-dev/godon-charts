name: "Upgrade Godon Stack (Fast Iteration)"

on:
  workflow_dispatch:

jobs:
  deploy_godon_chart:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Verify KIND Cluster
        run: |
          echo "🔍 Verifying KIND cluster..."
          
          # Check if KIND cluster exists
          if ! kind get clusters | grep -q "godon-1-cluster"; then
            echo "❌ KIND cluster 'godon-1-cluster' not found"
            echo "Available clusters:"
            kind get clusters
            echo ""
            echo "Please run the 'kind--setup-cluster' workflow first"
            exit 1
          fi
          
          echo "✅ KIND cluster exists"
          
          # Export kubeconfig to known location
          kind export kubeconfig --name=godon-1-cluster --kubeconfig=/tmp/kind_kubeconfig.yaml
          
          # Verify connectivity
          kubectl cluster-info --kubeconfig=/tmp/kind_kubeconfig.yaml

      - name: Prepare HostPath Directories
        run: |
          echo "📁 Ensuring hostPath directories have correct permissions..."
          for node in $(kind get nodes --name godon-1-cluster); do
            echo "Checking directories on node: $node"
            docker exec "$node" mkdir -p /srv/storage/grafana
            docker exec "$node" chmod 777 /srv/storage/grafana
          done
          echo "✅ HostPath directories ready"

      - name: Upgrade Godon Stack
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "🔄 Upgrading Godon stack (preserving databases and state)"
          # Deploy without waiting for Helm's internal readiness detection (KIND compatibility)
          helm upgrade godon ./charts/godon/ \
               --dependency-update \
               --create-namespace --namespace godon \
               --values ./stacks/osuosl/test-stack.yaml \
               --wait=false --timeout 5m

      - name: Upgrade Observability Stack
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "🔄 Upgrading Observability stack"
          helm upgrade godon-observability ./charts/godon-observability/ \
               --dependency-update \
               --create-namespace --namespace godon-observability \
               --wait=false --timeout 5m

      - name: Verify Upgrade Readiness
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "⏳ Waiting for upgraded Godon stack to become ready..."
          # Verify readiness with kubectl (more reliable in KIND than Helm wait)
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=godon -n godon --timeout=10m
          echo "✅ All Godon pods are ready after upgrade!"

      - name: Deployment Status Report
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "📊 Godon Stack Status After Upgrade"
          echo "========================================"
          helm status godon \
               --namespace godon \
               --show-resources

          echo ""
          echo "📊 Observability Stack Status"
          echo "========================================"
          helm status godon-observability \
               --namespace godon-observability \
               --show-resources || true

          echo ""
          echo "🏥 Pod Status"
          kubectl get pods -n godon
          kubectl get pods -n godon-observability

