          echo "  ✅ Duplicate name rejection"
          echo "  ✅ Special character handling"
          echo "  ✅ Unicode character handling"
          echo "  ✅ Empty list handling"
          echo "  ✅ Multiple concurrent operations"
          echo "  ✅ Resource cleanup"

      - name: Cleanup Port Forward
        if: always()
        run: |
          echo "🧹 Cleaning up port forward..."
          
          if [ -f /tmp/pf_pid ]; then
            PF_PID=$(cat /tmp/pf_pid)
            echo "Killing port forward process (PID: ${PF_PID})"
            kill ${PF_PID} || true
            rm /tmp/pf_pid
          fi
          
          echo "✅ Port forward cleanup completed"
