name: "Reinstall Godon Stack (Clean Slate)"

on:
  workflow_dispatch:

jobs:
  deploy_godon_chart:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Verify KIND Cluster
        run: |
          echo "🔍 Verifying KIND cluster..."
          
          # Check if KIND cluster exists
          if ! kind get clusters | grep -q "godon-1-cluster"; then
            echo "❌ KIND cluster 'godon-1-cluster' not found"
            echo "Available clusters:"
            kind get clusters
            echo ""
            echo "Please run the 'kind--setup-cluster' workflow first"
            exit 1
          fi
          
          echo "✅ KIND cluster exists"
          
          # Export kubeconfig to known location
          kind export kubeconfig --name=godon-1-cluster --kubeconfig=/tmp/kind_kubeconfig.yaml
          
          # Verify connectivity
          kubectl cluster-info --kubeconfig=/tmp/kind_kubeconfig.yaml

      - name: Cleanup Former Deployment
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "🧹 Cleaning up former deployments..."
          
          kubectl -n godon delete statefulsets --all --ignore-not-found || true
          kubectl -n godon-observability delete statefulsets --all --ignore-not-found || true
          
          helm uninstall godon --ignore-not-found --namespace godon || true
          helm uninstall godon-observability --ignore-not-found --namespace godon-observability || true
          
          sleep 3
          
          echo "🗑️ Force deleting stuck pods..."
          kubectl -n godon delete pods --all --force --grace-period=0 || true
          kubectl -n godon-observability delete pods --all --force --grace-period=0 || true
          
          for ns in godon godon-observability; do
            for pod in $(kubectl -n "$ns" get pods -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl -n "$ns" patch pod "$pod" --patch '{"metadata":{"finalizers":null}}' 2>/dev/null || true
            done
          done
          
          echo "🗑️ Deleting ALL persistent volumes..."
          kubectl -n godon delete pvc --all --force --grace-period=0 || true
          kubectl -n godon-observability delete pvc --all --force --grace-period=0 || true
          
          for pvc in $(kubectl -n godon-observability get pvc -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            kubectl -n godon-observability patch pvc "$pvc" --patch '{"metadata":{"finalizers":null}}' 2>/dev/null || true
          done
          
          echo "🗑️ Deleting secrets..."
          kubectl -n godon-observability delete secret --all || true
          sleep 2
          
          echo "🧹 Cleaning up hostPath data from KIND nodes..."
          for node in $(kind get nodes --name godon-1-cluster); do
            echo "Cleaning up node: $node"
            docker exec "$node" rm -rf /srv/storage/yugabytedb/ || true
            docker exec "$node" rm -rf /srv/storage/loki/ || true
            docker exec "$node" rm -rf /srv/storage/grafana/ || true
            docker exec "$node" rm -rf /srv/storage/clickhouse/ || true
          done
          echo "✅ hostPath data cleaned"
          
          echo "✅ Cleanup complete"

      - name: Deploy Observability Stack
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "🚀 Deploying observability stack..."
          helm install godon-observability ./charts/godon-observability/ \
               --dependency-update \
               --create-namespace --namespace godon-observability \
               --wait=false --timeout 5m

      - name: Deploy Godon Stack
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "🚀 Deploying Godon stack..."
          helm install godon ./charts/godon/ \
               --dependency-update \
               --namespace godon \
               --values ./stacks/osuosl/test-stack.yaml \
               --wait=false --timeout 5m

      - name: Verify Deployment Readiness
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "⏳ Waiting for stacks to become ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=godon-observability -n godon-observability --timeout=10m || true
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=godon -n godon --timeout=10m || true
          echo "✅ All pods ready!"

      - name: Deployment Status Report
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "📊 Deployment Status"
          echo "=============================="
          echo ""
          echo "Observability Stack:"
          helm status godon-observability --namespace godon-observability --show-resources || true
          echo ""
          kubectl get pods -n godon-observability
          echo ""
          echo "Godon Stack:"
          helm status godon --namespace godon --show-resources || true
          echo ""
          kubectl get pods -n godon
          echo ""
          echo "✅ Clean slate deployment complete"
